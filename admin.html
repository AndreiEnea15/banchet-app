<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Banchet</title>

<style>
body {
    font-family: -apple-system, sans-serif;
    background: #0f172a;
    color: white;
    padding: 30px;
}

h1 { margin-bottom: 10px; }

.topbar {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
}

select, button {
    padding: 8px;
    border-radius: 8px;
    border: none;
}

.stat {
    margin-bottom: 20px;
    font-size: 18px;
    color: #38bdf8;
}

.grid {
    display: grid;
    gap: 10px;
}

.card {
    background: #1e293b;
    padding: 15px;
    border-radius: 10px;
}

.badge {
    padding: 3px 8px;
    border-radius: 6px;
    font-size: 12px;
}

.green { background: #16a34a; }
.red { background: #dc2626; }
.blue { background: #3b82f6; }
</style>
</head>

<body>

<h1>📊 Dashboard Banchet</h1>

<div class="topbar">
<select id="filter">
    <option value="all">Toți</option>
    <option value="Da">Doar vine</option>
    <option value="Nu">Nu vine</option>
</select>

<button onclick="exportCSV()">Export CSV</button>
</div>

<div class="stat" id="stats"></div>

<div id="list" class="grid"></div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyB18N1nJuYOyCvaPwmqHw2XTVW_DdLPZtg",
  authDomain: "banchet-app.firebaseapp.com",
  projectId: "banchet-app"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let allData = [];

// 🔴 LIVE UPDATE
db.collection("banchet").onSnapshot(snapshot => {
    allData = [];
    snapshot.forEach(doc => {
        allData.push(doc.data());
    });

    render();
});

// 🔍 FILTER + RENDER
function render(){
    const filter = document.getElementById("filter").value;
    const list = document.getElementById("list");
    list.innerHTML = "";

    let total = 0;
    let count = 0;

    allData.forEach(d => {

        if(filter !== "all" && d.attend !== filter) return;

        count++;
        total += d.people || 0;

        const div = document.createElement("div");
        div.className = "card";

        const badgeClass =
            d.attend === "Da" ? "green" :
            d.attend === "Nu" ? "red" : "blue";

        div.innerHTML = `
            <b>${d.name}</b><br>
            <span class="badge ${badgeClass}">${d.attend}</span><br>
            Persoane: ${d.people}<br>
            Dansează: ${d.dance}
        `;

        list.appendChild(div);
    });

    document.getElementById("stats").innerText =
        "👥 Total persoane: " + total + " | Răspunsuri: " + count;
}

// 🔄 schimb filter
document.getElementById("filter").onchange = render;

// 📥 EXPORT CSV
function exportCSV(){
    let csv = "Nume,Participa,Persoane,Danseaza\n";

    allData.forEach(d => {
        csv += `${d.name},${d.attend},${d.people},${d.dance}\n`;
    });

    const blob = new Blob([csv], { type: "text/csv" });
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "banchet.csv";
    a.click();
}
</script>

</body>
</html>
