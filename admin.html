<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Banchet</title>

<style>
body {
    font-family: -apple-system, sans-serif;
    background: #0f172a;
    color: white;
    padding: 30px;
}

h1 { margin-bottom: 20px; }

.card {
    background: #1e293b;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 10px;
}

.stat {
    font-size: 20px;
    margin-bottom: 20px;
    color: #38bdf8;
}
</style>
</head>

<body>

<h1>📊 Dashboard Banchet</h1>

<div class="stat" id="total">Total participanți: ...</div>

<div id="list"></div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyB18N1nJuYOyCvaPwmqHw2XTVW_DdLPZtg",
  authDomain: "banchet-app.firebaseapp.com",
  projectId: "banchet-app"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

async function loadData(){

    const snapshot = await db.collection("banchet").get();

    let total = 0;
    const list = document.getElementById("list");
    list.innerHTML = "";

    snapshot.forEach(doc => {
        const d = doc.data();

        total += d.people || 0;

        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
            <b>${d.name}</b><br>
            Vii: ${d.attend}<br>
            Persoane: ${d.people}<br>
            Dansează: ${d.dance}
        `;

        list.appendChild(div);
    });

    document.getElementById("total").innerText =
        "👥 Total participanți: " + total;
}

loadData();
</script>

</body>
</html>
