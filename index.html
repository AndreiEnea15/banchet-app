<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Formular Banchet 🎓</title>

<style>
body {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
}

.container {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(15px);
    padding: 30px;
    border-radius: 20px;
    width: 420px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.4);
}

h1 { text-align: center; }

.question { margin: 18px 0; }

label {
    display: block;
    margin-bottom: 6px;
}

input, select {
    width: 100%;
    padding: 10px;
    border-radius: 10px;
    border: none;
}

.toggle-group {
    display: flex;
    gap: 10px;
}

.toggle-btn {
    flex: 1;
    padding: 10px;
    border-radius: 10px;
    border: none;
    background: #334155;
    color: white;
    cursor: pointer;
}

.toggle-btn.active {
    background: #6366f1;
    transform: scale(1.05);
}

button.submit {
    width: 100%;
    padding: 12px;
    border-radius: 12px;
    border: none;
    background: #6366f1;
    color: white;
    margin-top: 15px;
    cursor: pointer;
}

.hidden { display: none; }

#success {
    display: none;
    margin-top: 15px;
    color: #22c55e;
}

#suggestion {
    display: none;
    font-size: 14px;
    color: #38bdf8;
}
</style>
</head>

<body>

<div class="container">
    <h1>🎓 Formular Banchet</h1>

    <div class="question">
        <label>Nume:</label>
        <input type="text" id="name">
    </div>

    <div class="question">
        <label>Vii la banchet?</label>
        <select id="attend">
            <option value="">Selectează</option>
            <option>Da</option>
            <option>Nu</option>
            <option>Nu m-am hotărât</option>
            <option>Aș veni dar nu am cu cine</option>
        </select>

        <div id="suggestion">👉 Poți veni cu colegii!</div>
    </div>

    <div class="question hidden" id="peopleBox">
        <label>Câte persoane?</label>
        <input type="number" id="people" min="1">
    </div>

    <div class="question">
        <label>Dansezi?</label>
        <div class="toggle-group">
            <button class="toggle-btn" id="danceYes">Da</button>
            <button class="toggle-btn" id="danceNo">Nu</button>
        </div>
    </div>

    <button class="submit" id="submitBtn">Trimite</button>

    <div id="success">✅ Răspuns trimis!</div>
    <div id="stats"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getFirestore, addDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB18N1nJuYOyCvaPwmqHw2XTVW_DdLPZtg",
  authDomain: "banchet-app.firebaseapp.com",
  projectId: "banchet-app",
  storageBucket: "banchet-app.firebasestorage.app",
  messagingSenderId: "382781188547",
  appId: "1:382781188547:web:6676cb909c79ba49b3b576"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// SELECT ELEMENTE
const attend = document.getElementById("attend");
const peopleBox = document.getElementById("peopleBox");
const suggestion = document.getElementById("suggestion");
const submitBtn = document.getElementById("submitBtn");

let danceValue = "";

// LOGICĂ DINAMICĂ
attend.addEventListener("change", () => {
    const val = attend.value;

    peopleBox.classList.add("hidden");
    suggestion.style.display = "none";

    if (val === "Da") {
        peopleBox.classList.remove("hidden");
    }

    if (val === "Aș veni dar nu am cu cine") {
        suggestion.style.display = "block";
    }
});

// TOGGLE DANS
document.getElementById("danceYes").addEventListener("click", () => {
    danceValue = "Da";
    setActive("danceYes");
});

document.getElementById("danceNo").addEventListener("click", () => {
    danceValue = "Nu";
    setActive("danceNo");
});

function setActive(id){
    document.querySelectorAll(".toggle-btn").forEach(b => b.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

// SUBMIT
submitBtn.addEventListener("click", async () => {
    const name = document.getElementById("name").value;
    const attendVal = attend.value;
    let people = parseInt(document.getElementById("people").value) || 0;

    if (!name || !attendVal || !danceValue){
        alert("Completează toate câmpurile!");
        return;
    }

    if (attendVal !== "Da") people = 0;

    await addDoc(collection(db, "banchet"), {
        name,
        attend: attendVal,
        people,
        dance: danceValue,
        createdAt: new Date()
    });

    document.getElementById("success").style.display = "block";

    loadStats();
});

// STATS
async function loadStats(){
    const snapshot = await getDocs(collection(db, "banchet"));

    let total = 0;
    snapshot.forEach(doc => total += doc.data().people || 0);

    document.getElementById("stats").innerText =
        "👥 Total participanți: " + total;
}

loadStats();
</script>

</body>
</html>
