<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Formular Banchet 🎓</title>

<style>
body {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
}

.container {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(15px);
    padding: 30px;
    border-radius: 20px;
    width: 420px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.4);
}

.question { margin: 18px 0; }

input, select {
    width: 100%;
    padding: 10px;
    border-radius: 10px;
    border: none;
}

.hidden { display: none; }

.toggle {
    display: flex;
    gap: 10px;
}

.toggle button {
    flex: 1;
    padding: 10px;
    background: #334155;
    border: none;
    color: white;
    cursor: pointer;
}

.active {
    background: #6366f1;
}

button.submit {
    width: 100%;
    padding: 12px;
    background: #6366f1;
    border: none;
    border-radius: 12px;
    color: white;
    margin-top: 10px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="container">

<h2>🎓 Formular Banchet</h2>

<div class="question">
<input id="name" placeholder="Nume">
</div>

<div class="question">
<select id="attend">
<option value="">Vii la banchet?</option>
<option>Da</option>
<option>Nu</option>
<option>Nu m-am hotărât</option>
<option>Aș veni dar nu am cu cine</option>
</select>

<p id="suggestion" class="hidden">👉 Poți veni cu colegii!</p>
</div>

<div class="question hidden" id="peopleBox">
<input type="number" id="people" placeholder="Câte persoane?">
</div>

<div class="question toggle">
<button id="yes">Dansez</button>
<button id="no">Nu dansez</button>
</div>

<button class="submit" id="submit">Trimite</button>

<p id="success"></p>

</div>

<!-- 🔥 Firebase (fără module → stabil) -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyB18N1nJuYOyCvaPwmqHw2XTVW_DdLPZtg",
  authDomain: "banchet-app.firebaseapp.com",
  projectId: "banchet-app"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let dance = "";

// logică
document.getElementById("attend").addEventListener("change", function() {
    const val = this.value;

    document.getElementById("peopleBox").classList.add("hidden");
    document.getElementById("suggestion").classList.add("hidden");

    if (val === "Da") {
        document.getElementById("peopleBox").classList.remove("hidden");
    }

    if (val === "Aș veni dar nu am cu cine") {
        document.getElementById("suggestion").classList.remove("hidden");
    }
});

// toggle
document.getElementById("yes").onclick = () => {
    dance = "Da";
    setActive("yes");
};

document.getElementById("no").onclick = () => {
    dance = "Nu";
    setActive("no");
};

function setActive(id){
    document.querySelectorAll(".toggle button").forEach(b=>b.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

// submit
document.getElementById("submit").onclick = async () => {

    console.log("CLICK OK");

    const name = document.getElementById("name").value;
    const attend = document.getElementById("attend").value;
    let people = parseInt(document.getElementById("people").value) || 0;

    if (!name || !attend || !dance){
        alert("Completează!");
        return;
    }

    if (attend !== "Da") people = 0;

    try {
        await db.collection("banchet").add({
            name,
            attend,
            people,
            dance,
            createdAt: new Date()
        });

        document.getElementById("success").innerText = "✅ Salvat!";
    } catch(e){
        console.error(e);
        alert("Eroare Firebase!");
    }
};
</script>

</body>
</html>
