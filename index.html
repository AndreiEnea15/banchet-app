<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Banchet 🎓</title>

<style>
body {
    font-family: -apple-system, sans-serif;
    background: linear-gradient(135deg,#0f172a,#1e293b);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    margin:0;
}
.container {
    background:rgba(255,255,255,0.05);
    padding:30px;
    border-radius:20px;
    width:400px;
}
.hidden{display:none;}
button{padding:10px;width:100%;margin-top:10px;}
.toggle{display:flex;gap:10px;}
.toggle button{flex:1;}
.active{background:#6366f1;}
</style>
</head>

<body>

<div class="container">
<h2>Formular Banchet</h2>

<input id="name" placeholder="Nume"><br><br>

<select id="attend">
<option value="">Vii la banchet?</option>
<option>Da</option>
<option>Nu</option>
<option>Nu m-am hotărât</option>
<option>Aș veni dar nu am cu cine</option>
</select>

<p id="suggestion" class="hidden">👉 Poți veni cu colegii!</p>

<div id="peopleBox" class="hidden">
<input type="number" id="people" placeholder="Câte persoane?">
</div>

<br>

<div class="toggle">
<button id="yes">Dansez</button>
<button id="no">Nu dansez</button>
</div>

<button id="submit" type="button">Trimite</button>

<p id="success"></p>
<p id="stats"></p>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getFirestore, addDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

// 🔥 CONFIGUL TĂU
const firebaseConfig = {
  apiKey: "AIzaSyB18N1nJuYOyCvaPwmqHw2XTVW_DdLPZtg",
  authDomain: "banchet-app.firebaseapp.com",
  projectId: "banchet-app",
  storageBucket: "banchet-app.firebasestorage.app",
  messagingSenderId: "382781188547",
  appId: "1:382781188547:web:6676cb909c79ba49b3b576"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ELEMENTE
const attend = document.getElementById("attend");
const peopleBox = document.getElementById("peopleBox");
const suggestion = document.getElementById("suggestion");
const submitBtn = document.getElementById("submit");

let dance = "";

// LOGICĂ
attend.addEventListener("change", () => {
    console.log("CHANGE FUNCȚIONEAZĂ");

    peopleBox.classList.add("hidden");
    suggestion.classList.add("hidden");

    if (attend.value === "Da") {
        peopleBox.classList.remove("hidden");
    }

    if (attend.value === "Aș veni dar nu am cu cine") {
        suggestion.classList.remove("hidden");
    }
});

// TOGGLE
document.getElementById("yes").onclick = () => {
    dance = "Da";
    setActive("yes");
};

document.getElementById("no").onclick = () => {
    dance = "Nu";
    setActive("no");
};

function setActive(id){
    document.querySelectorAll(".toggle button").forEach(b=>b.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

// SUBMIT
submitBtn.addEventListener("click", async () => {

    console.log("CLICK FUNCȚIONEAZĂ");

    const name = document.getElementById("name").value;
    let people = parseInt(document.getElementById("people").value) || 0;

    if (!name || !attend.value || !dance){
        alert("Completează!");
        return;
    }

    if (attend.value !== "Da") people = 0;

    try {
        await addDoc(collection(db, "banchet"), {
            name,
            attend: attend.value,
            people,
            dance,
            createdAt: new Date()
        });

        console.log("SALVAT!");

        document.getElementById("success").innerText = "✅ Salvat!";
        loadStats();

    } catch (e) {
        console.error("EROARE:", e);
        alert("Eroare Firebase!");
    }
});

// STATS
async function loadStats(){
    const snap = await getDocs(collection(db, "banchet"));
    let total = 0;

    snap.forEach(d => total += d.data().people || 0);

    document.getElementById("stats").innerText =
        "👥 Total: " + total;
}

loadStats();
</script>

</body>
</html>
